name: Discount Bot

on:
  schedule:
    - cron: '0 * * * *'    # every hour, 24/7
  workflow_dispatch:         # manual trigger from GitHub

jobs:
  check-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to save price cache back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run discount bot
        run: python discount_bot.py
        env:
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Save price cache to repo
        run: |
          git config user.name  "Discount Bot"
          git config user.email "bot@github-actions"
          git add price_cache.json
          git diff --cached --quiet || git commit -m "Update price cache [skip ci]"
          git push
